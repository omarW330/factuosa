name: Sync data from Dropbox
on:
  schedule:
    - cron: '20 6 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Descargar JSON desde Dropbox
        env:
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
          DROPBOX_WEB_FOLDER: ${{ secrets.DROPBOX_WEB_FOLDER }}
        run: python scripts/sync_dropbox.py
      - name: Commit si hay cambios
        run: |
          git config user.name "agm-bot"
          git config user.email "agm-bot@users.noreply.github.com"
          git add public/data
          if git diff --cached --quiet; then echo "Sin cambios"; else git commit -m "data: sync $(date -u +%F)" && git push; fi
