name: Relay Supabase ↔ Dropbox
on:
  schedule:
    - cron: '*/10 * * * *'   # cada ~10 min (GitHub puede retrasarlo)
  workflow_dispatch:          # botón "Run workflow" para probar al momento
    inputs:
      reprocess:
        description: 'Re-vuelca también los lotes ya procesados (/web/procesados)'
        type: boolean
        default: false
concurrency:
  group: relay
  cancel-in-progress: false
jobs:
  relay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python scripts/relay.py
        env:
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          REPROCESS: ${{ (github.event_name == 'workflow_dispatch' && inputs.reprocess) && '1' || '' }}
